# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"
  - "GitHub Copilot"

ai_usage_summary: |
  Used Claude for architecture discussion, code review, feature design,
  iterative testing, and the reasoning engine. Used GitHub Copilot for
  autocompletion and boilerplate. All ranking logic was designed, validated,
  and tuned by the team through cross-validation experiments and stress tests.
  No candidate data was sent to any hosted LLM; ranking is fully deterministic
  and runs offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A deterministic five-dimension weighted ranker with no external dependencies.
  Each candidate is scored on JD alignment (0.30), technical depth (0.30),
  production-shipping evidence (0.25), availability (0.08), and behavioral
  reliability (0.07). A multiplicative penalty layer catches dealbreakers —
  YoE over-claims (derived from career history, not the unreliable profile
  field), keyword stuffing, copy-paste descriptions, culture-statement
  contradictions, non-compete clauses, manager-only profiles, eval-framework
  absence, and flight risk. Three hard caps handle unreachable candidates,
  visa constraints, and confirmed data-integrity issues. An 81.5% honeypot
  pre-filter removes impossible profiles before scoring. A pairwise re-ranking
  pass resolves close calls in the top 100 using six ordered recruiter-style
  rules. Runtime ~26s on CPU for 100K candidates, ~1.6 GB peak memory, pure
  Python standard library. Fully reproducible: identical CSV across runs.

